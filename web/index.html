<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SP — Flutter Developer Portfolio. Mobile Application Developer specializing in Flutter, Firebase, Riverpod & AI-powered apps. Based in Udaipur, India.">
  <meta name="keywords" content="Flutter Developer, Mobile Developer, Flutter Portfolio, Dart, Firebase, Riverpod, BLoC, Clean Architecture, Udaipur, India">
  <meta name="author" content="SP">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8B5CF6">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="SP | Flutter Developer">
  <meta property="og:description" content="Mobile Application Developer specializing in Flutter & AI-powered apps. CSE Student | Udaipur, India.">
  <meta property="og:image" content="assets/images/og-cover.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SP | Flutter Developer">
  <meta name="twitter:description" content="Mobile Application Developer specializing in Flutter & AI-powered apps.">
  <meta name="twitter:image" content="assets/images/og-cover.png">

  <!-- Canonical -->
  <link rel="canonical" href="https://your-portfolio.web.app/">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Google Fonts preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <title>SP | Flutter Developer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #090912;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Loading splash ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #090912;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    .splash-logo {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #8B5CF6, #06B6D4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .splash-tagline {
      font-size: 13px;
      color: #475569;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .splash-bar-wrap {
      width: 180px;
      height: 2px;
      background: rgba(139, 92, 246, 0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .splash-bar {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #8B5CF6, #06B6D4);
      animation: bar 1.6s ease-in-out infinite;
    }

    @keyframes bar {
      0%   { width: 0%;   opacity: 1; }
      70%  { width: 100%; opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Loading splash — hidden on first Flutter frame -->
  <div id="splash">
    <div class="splash-logo">SP.dev</div>
    <div class="splash-tagline">Flutter Developer</div>
    <div class="splash-bar-wrap">
      <div class="splash-bar"></div>
    </div>
  </div>

  <script>
    // Hide splash when Flutter renders its first frame
    window.addEventListener('flutter-first-frame', () => {
      const splash = document.getElementById('splash');
      splash.style.opacity = '0';
      setTimeout(() => splash.remove(), 400);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
